# lite-llm example configuration
# Copy this file to ~/.config/lite-llm/config.toml and fill in your values.
# All settings can also be overridden via environment variables (prefix: LITE_LLM_).

[api]
# Base URL of the OpenAI-compatible API endpoint.
# Environment variable: LITE_LLM_BASE_URL
# For LM Studio: http://localhost:1234
# For Ollama:    http://localhost:11434
#base_url = "https://api.openai.com"

# API key sent in the Authorization header.
# For local APIs that do not require authentication, leave commented out.
# Environment variable: LITE_LLM_API_KEY
#api_key = "sk-..."

# HTTP request timeout in seconds.
#timeout_seconds = 120

# Structured output strategy when --format json or --json-schema is used.
#   auto   — send response_format; fall back to prompt injection on unsupported APIs (default)
#   native — always send response_format; fail if the API does not support it
#   prompt — never send response_format; always use system-prompt injection
#response_format_strategy = "auto"

[model]
# Default model name.
# Environment variable: LITE_LLM_MODEL
name = "gpt-4o-mini"

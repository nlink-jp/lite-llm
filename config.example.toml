# lite-llm configuration file
# Copy to ~/.config/lite-llm/config.toml and fill in your values.
#
# Environment variables override file values:
#   LITE_LLM_API_KEY   — API key
#   LITE_LLM_ENDPOINT  — API base URL
#   LITE_LLM_MODEL     — default model

# API base URL.
# Default: https://api.openai.com
# For LM Studio: http://localhost:1234
# For Ollama:    http://localhost:11434
#endpoint = "https://api.openai.com"

# Default model name.
# This value is also the compiled-in default when no config file is present.
model = "gpt-4o-mini"

# API key.
# For local APIs that do not require authentication, leave commented out.
#api_key = "sk-..."

# HTTP request timeout in seconds. Default: 120
#timeout_seconds = 120

# Structured output strategy when --format json or --json-schema is used.
#   auto   — send response_format; fall back to prompt injection on unsupported APIs (default)
#   native — always send response_format; fail if the API does not support it
#   prompt — never send response_format; always use system-prompt injection
#response_format_strategy = "auto"
